name: Build and Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Compile
        run: |
          mkdir out
          javac -d out src/model/*.java src/viewcontrol/*.java src/Main.java
      - name: Create Manifest
        run: echo "Main-Class: Main" > manifest.txt
      - name: Build JAR
        run: jar cvfm Paint.jar manifest.txt -C out .
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Paint-JAR
          path: Paint.jar

  build-executables:
    needs: build-jar
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: Paint-JAR
          path: .
      
      # Linux Build (.deb)
      - name: Build Executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage --type deb --name Paint --input . --main-jar Paint.jar --main-class Main
      - name: Upload Linux DEB
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Paint-Linux
          path: "*.deb"

      # Windows Build (.exe)
      - name: Build Executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          jpackage --type exe --name Paint --input . --main-jar Paint.jar --main-class Main --win-shortcut --win-menu
      - name: Upload Windows EXE
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Paint-Windows
          path: "*.exe"

      # Mac Build (.dmg)
      - name: Build Executable (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          jpackage --type dmg --name Paint --input . --main-jar Paint.jar --main-class Main
      - name: Upload Mac DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Paint-Mac
          path: "*.dmg"
